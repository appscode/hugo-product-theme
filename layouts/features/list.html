{{ define "main" }}

{{ $p := (index .Site.Data.products .Site.Params.product_key) }}

<!-- features hero start -->
<section class="features-hero">
  <div class="features-hero-bg" aria-hidden="true">
    <div class="fh-orb fh-orb-1"></div>
    <div class="fh-orb fh-orb-2"></div>
    <div class="fh-grid"></div>
  </div>
  <div class="container">
    <div class="features-hero-inner">
      <div class="features-hero-badge">
        <iconify-icon icon="heroicons:sparkles" width="13" height="13"></iconify-icon>
        <span>All Features</span>
      </div>
      <h1>{{ $p.name }} <span class="features-hero-gradient">Features</span></h1>
      <p>{{ $p.summary }}</p>
      <div class="buttons is-justify-content-center">
        <a href="/docs/{{ $p.latestVersion }}/setup/" class="button ac-button is-white">
          <span class="icon"><iconify-icon icon="heroicons:bolt" width="16" height="16"></iconify-icon></span>
          <span>Install Now Free</span>
        </a>
        <a href="{{ $.Site.Params.domain_appscode }}/contact/" class="button ac-button is-secondary">
          <span class="icon"><iconify-icon icon="heroicons:chat-bubble-bottom-center" width="16" height="16"></iconify-icon></span>
          <span>Talk to Us</span>
        </a>
      </div>
    </div>
  </div>
</section>
<!-- features hero end -->

<!-- feature sections start -->
<div class="fl-sections">
  {{ range $idx, $f := $p.features }}
  <section class="fl-section {{ if modBool $idx 2 }}fl-section--reversed{{ end }}">
    <div class="container">
      <div class="fl-section-inner">

        <!-- text -->
        <div class="fl-section-text">
          <div class="fl-section-num">{{ printf "%02d" (add $idx 1) }}</div>
          <h2>{{ $f.title }}</h2>
          <p>{{ $f.description }}</p>
        </div>

        <!-- illustration -->
        <div class="fl-section-visual">
          <div class="fl-section-image-wrap">
            <img src="{{ $f.image.src }}" alt="{{ $f.image.alt }}" loading="lazy" />
          </div>
        </div>

      </div>
    </div>
  </section>
  {{ end }}
</div>
<!-- feature sections end -->

{{ end }}
