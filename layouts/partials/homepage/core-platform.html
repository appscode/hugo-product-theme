{{ $d := index $.Site.Data.products.kubedb.homepage "core-platform" }}

<section class="core-platform-section section-padding">
  <div class="home-section-bg">
    <div class="bg-orb bg-orb-tl"></div>
    <div class="bg-orb bg-orb-br"></div>
  </div>
  <div class="container">
    <div class="section-header">
      <div class="badge">
        <span class="badge-dot"></span>
        <span class="badge-text">{{ $d.badge }}</span>
      </div>
      <h2 class="section-header-title">
        {{ $d.title_plain }}<br>
        <span class="text-gradient">{{ $d.title_gradient }}</span>
      </h2>
      <p class="section-header-desc">{{ $d.description }}</p>
    </div>

    <div class="columns is-multiline is-variable">
      {{ range $d.features }}
      <div class="column is-3-desktop is-6-tablet">
        <div class="feature-card">
          <div class="feature-card-icon" style="background: {{ .icon_gradient | safeCSS }};">
            {{ printf `<iconify-icon icon="%s" width="28" height="28"></iconify-icon>` .icon | safeHTML }}
          </div>
          <h3 class="feature-card-title">{{ .title }}</h3>
          <p class="feature-card-desc">{{ .desc }}</p>
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</section>
