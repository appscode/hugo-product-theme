{{ $d := index $.Site.Data.products.kubedb.homepage "own-dbaas" }}

<section class="home-section home-section-light">
  <div class="container">
    <div class="code-wrap use-cases-wrap">
      <div class="section-header">
        <div class="badge badge-light">
          <iconify-icon icon="heroicons:users" width="16" height="16" style="color:#4948A3;"></iconify-icon>
          <span class="badge-text">{{ $d.badge }}</span>
        </div>
        <h2 class="section-header-title">
          {{ $d.title_plain }}<br>
          <span class="text-gradient">{{ $d.title_gradient }}</span>
        </h2>
        <p class="section-header-desc">{{ $d.description }}</p>
      </div>

      <div class="columns is-multiline">
        {{ range $d.use_cases }}
        <div class="column is-3-desktop is-6-tablet">
          <div class="feature-card">
            <div class="feature-card-icon" style="background: {{ .icon_gradient | safeCSS }};">
              {{ printf `<iconify-icon icon="%s" width="28" height="28"></iconify-icon>` .icon | safeHTML }}
            </div>
            <h3 class="feature-card-title">{{ .title }}</h3>
            <p class="feature-card-desc">{{ .desc }}</p>
          </div>
        </div>
        {{ end }}
      </div>
    </div>
  </div>
</section>
